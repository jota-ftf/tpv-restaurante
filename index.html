<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<title>TPV Restaurante</title>
<style>
:root {
  --bg:        #0f0f0f;
  --bg2:       #1a1a1a;
  --bg3:       #242424;
  --border:    #2e2e2e;
  --text:      #f0ede8;
  --muted:     #888;
  --accent:    #e8a04a;
  --accent2:   #d4724a;
  --green:     #4caf7d;
  --red:       #e05555;
  --blue:      #4a90d9;
  --purple:    #9b7fe8;
  --r:         10px;
  --r-sm:      6px;
  --shadow:    0 2px 12px rgba(0,0,0,.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow: hidden;
}

/* ── PANTALLAS ── */
.screen { display: none; height: 100dvh; flex-direction: column; }
.screen.active { display: flex; }

/* ── LOGIN ── */
#s-login {
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at 50% 0%, #2a1a0a 0%, var(--bg) 60%);
}
.login-box {
  width: min(380px, 94vw);
  text-align: center;
}
.login-logo { font-size: 3.5rem; margin-bottom: 8px; }
.login-title {
  font-size: 1.6rem;
  font-weight: 600;
  letter-spacing: -.5px;
  color: var(--accent);
  margin-bottom: 4px;
}
.login-sub { color: var(--muted); font-size: .85rem; margin-bottom: 32px; }

.emp-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}
.emp-btn {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 16px 10px;
  cursor: pointer;
  transition: all .15s;
  text-align: center;
  color: var(--text);
}
.emp-btn:hover, .emp-btn.sel {
  border-color: var(--accent);
  background: rgba(232,160,74,.1);
}
.emp-btn .emp-icon { font-size: 1.8rem; margin-bottom: 6px; }
.emp-btn .emp-name { font-size: .85rem; font-weight: 500; }
.emp-btn .emp-rol { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

.pin-label { font-size: .8rem; color: var(--muted); margin-bottom: 10px; }
.pin-display {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 20px;
}
.pin-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--border);
  transition: background .15s;
}
.pin-dot.filled { background: var(--accent); }

.pin-pad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  max-width: 280px;
  margin: 0 auto;
}
.pin-key {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 18px;
  font-size: 1.3rem;
  font-weight: 500;
  cursor: pointer;
  transition: all .1s;
  color: var(--text);
  text-align: center;
  user-select: none;
}
.pin-key:active { background: var(--bg3); transform: scale(.95); }
.pin-key.del { font-size: 1rem; color: var(--muted); }
.pin-key.ok {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  font-weight: 700;
}
.pin-key.ok:active { background: var(--accent2); }
.pin-error { color: var(--red); font-size: .85rem; margin-top: 12px; min-height: 20px; }

/* ── SELECTOR DE ZONA ── */
#s-zona {
  background: var(--bg);
}
.zona-header {
  padding: 20px 20px 0;
  display: flex;
  align-items: center;
  gap: 12px;
}
.zona-header .bk {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 8px 14px;
  cursor: pointer;
  font-size: .85rem;
  color: var(--muted);
}
.zona-header h2 { font-size: 1.1rem; font-weight: 600; flex: 1; }
.zona-empleado { font-size: .8rem; color: var(--accent); }

.zona-tabs {
  display: flex;
  gap: 8px;
  padding: 16px 20px 0;
  border-bottom: 1px solid var(--border);
}
.zona-tab {
  padding: 8px 18px;
  border-radius: var(--r-sm) var(--r-sm) 0 0;
  cursor: pointer;
  font-size: .85rem;
  color: var(--muted);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  transition: all .15s;
}
.zona-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.zona-grid {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 12px;
  align-content: start;
}

.zona-card {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 16px 10px;
  cursor: pointer;
  transition: all .15s;
  text-align: center;
  position: relative;
}
.zona-card:active { transform: scale(.97); }
.zona-card.libre { border-color: var(--border); }
.zona-card.ocupada { border-color: var(--green); background: rgba(76,175,125,.08); }
.zona-card.mi-zona { border-color: var(--accent); }

.zona-card .zc-nombre { font-size: .95rem; font-weight: 600; margin-bottom: 4px; }
.zona-card .zc-estado { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.zona-card .zc-turno {
  position: absolute;
  top: 6px; right: 6px;
  background: var(--accent);
  color: #000;
  font-size: .65rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
}
.zona-card .zc-alerta {
  position: absolute;
  top: 6px; left: 6px;
  font-size: .85rem;
}
.zona-card .zc-total { font-size: .8rem; color: var(--green); margin-top: 4px; }

/* ── PEDIDO ── */
#s-pedido {
  background: var(--bg);
}
.ped-header {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.ped-header .bk {
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 7px 12px;
  cursor: pointer;
  font-size: .8rem;
  color: var(--muted);
}
.ped-zona-nombre { font-size: 1rem; font-weight: 700; flex: 1; }
.ped-total { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
.btn-cuenta {
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 7px 12px;
  cursor: pointer;
  font-size: .75rem;
  color: var(--muted);
}
.btn-cuenta.activo { border-color: var(--accent); color: var(--accent); }

.ped-tabs {
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.ped-tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  font-size: .82rem;
  color: var(--muted);
  border: none;
  background: transparent;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  position: relative;
}
.ped-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.ped-tab .badge {
  position: absolute;
  top: 6px; right: calc(50% - 28px);
  background: var(--red);
  color: #fff;
  font-size: .6rem;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 10px;
  min-width: 16px;
}

/* sub-pantallas del pedido */
.ped-sub { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.ped-sub.active { display: flex; }

/* árbol de menú */
.arbol-nav {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  min-height: 44px;
}
.arbol-nav .ruta { font-size: .78rem; color: var(--muted); flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.arbol-nav .bk-arbol {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 5px 10px;
  cursor: pointer;
  font-size: .78rem;
  color: var(--muted);
}

.arbol-grid {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 10px;
  align-content: start;
}

.arbol-nodo {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 16px 8px;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  user-select: none;
}
.arbol-nodo:active { transform: scale(.94); background: var(--bg3); }
.arbol-nodo .an-emoji { font-size: 2rem; margin-bottom: 6px; }
.arbol-nodo .an-nombre { font-size: .78rem; font-weight: 500; line-height: 1.2; }
.arbol-nodo .an-precio { font-size: .72rem; color: var(--accent); margin-top: 4px; }
.arbol-nodo.hoja { border-color: rgba(232,160,74,.3); }
.arbol-nodo.hoja:active { border-color: var(--accent); }

/* tapa extra en árbol */
.tapa-extra-bar {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
}
.tapa-extra-bar span { font-size: .82rem; color: var(--muted); flex: 1; }
.tapa-counter { display: flex; align-items: center; gap: 10px; }
.tc-btn {
  width: 32px; height: 32px;
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  cursor: pointer;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  transition: all .1s;
}
.tc-btn:active { background: var(--accent); border-color: var(--accent); color: #000; }
.tc-num { font-size: 1rem; font-weight: 700; min-width: 24px; text-align: center; }

/* ticket */
.ticket-scroll { flex: 1; overflow-y: auto; padding: 14px; }
.ronda-bloque {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: 12px;
  overflow: hidden;
}
.ronda-header {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg3);
}
.ronda-num { font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.ronda-estado { font-size: .72rem; padding: 2px 8px; border-radius: 10px; }
.ronda-estado.pendiente { background: rgba(74,144,217,.2); color: var(--blue); }
.ronda-estado.confirmada { background: rgba(232,160,74,.2); color: var(--accent); }
.ronda-estado.servida { background: rgba(76,175,125,.2); color: var(--green); }

.linea-row {
  display: flex;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.linea-row:last-child { border-bottom: none; }
.linea-nom { flex: 1; font-size: .88rem; }
.linea-tapa { font-size: .72rem; color: var(--accent); }
.linea-cant { font-size: .88rem; color: var(--muted); }
.linea-precio { font-size: .88rem; font-weight: 600; }
.linea-tapa-extra { color: var(--accent2); font-style: italic; }

.ticket-total {
  padding: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--border);
  font-size: 1.1rem;
  font-weight: 700;
}
.ticket-total span:last-child { color: var(--accent); }

/* botones de acción del pedido */
.ped-actions {
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
}
.btn-confirmar {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--r);
  padding: 14px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s;
}
.btn-confirmar:active { background: var(--accent2); transform: scale(.98); }
.btn-confirmar:disabled { background: var(--bg3); color: var(--muted); cursor: not-allowed; }

.btn-row { display: flex; gap: 8px; }
.btn-sec {
  flex: 1;
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 11px;
  font-size: .82rem;
  color: var(--text);
  cursor: pointer;
  text-align: center;
  transition: all .15s;
}
.btn-sec:active { border-color: var(--accent); }
.btn-ronda-servida { border-color: rgba(76,175,125,.4); color: var(--green); }
.btn-aviso {
  background: rgba(76,175,125,.15);
  border-color: var(--green);
  color: var(--green);
  animation: pulse-green 1.5s ease-in-out infinite;
}
.btn-aviso-beb {
  background: rgba(232,160,74,.15);
  border-color: var(--accent);
  color: var(--accent);
  animation: pulse-amber 1.5s ease-in-out infinite;
}
@keyframes pulse-green { 0%,100%{opacity:1} 50%{opacity:.6} }
@keyframes pulse-amber { 0%,100%{opacity:1} 50%{opacity:.6} }

/* ── COCINA ── */
#s-cocina {
  background: var(--bg);
}
.cocina-header {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.cocina-header h2 { flex: 1; font-size: 1.1rem; font-weight: 700; }
.cocina-destino {
  padding: 4px 12px;
  border-radius: var(--r-sm);
  font-size: .78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.cocina-destino.barra { background: rgba(232,160,74,.2); color: var(--accent); }
.cocina-destino.cocina { background: rgba(76,175,125,.2); color: var(--green); }

.cocina-lista {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.ticket-card {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}
.ticket-card.nuevo { border-color: var(--accent); animation: ticket-in .3s ease; }
.ticket-card.listo { border-color: var(--green); opacity: .6; }
@keyframes ticket-in { from { transform: translateY(-10px); opacity: 0; } }

.tc-head {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg3);
}
.tc-zona { font-size: .95rem; font-weight: 700; }
.tc-tiempo { font-size: .75rem; color: var(--muted); }
.tc-tiempo.urgente { color: var(--red); font-weight: 700; }
.tc-camarero { font-size: .75rem; color: var(--muted); }

.tc-lineas { padding: 10px 14px; }
.tc-linea { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.tc-linea:last-child { border-bottom: none; }
.tc-cant { font-size: 1.1rem; font-weight: 700; min-width: 28px; }
.tc-nom { flex: 1; font-size: .9rem; }
.tc-nota { font-size: .75rem; color: var(--accent); }

.tc-btn-listo {
  margin: 0 14px 14px;
  background: var(--green);
  color: #000;
  border: none;
  border-radius: var(--r);
  padding: 12px;
  font-size: .9rem;
  font-weight: 700;
  cursor: pointer;
  width: calc(100% - 28px);
  transition: all .15s;
}
.tc-btn-listo:active { background: #3d9a65; transform: scale(.98); }
.tc-btn-listo.ya-listo { background: var(--bg3); color: var(--muted); }

/* Cola de tickets barra (en app camarero/barman) */
.cola-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  min-height: 52px;
  align-items: center;
}
.cola-chip {
  background: var(--bg3);
  border: 1.5px solid var(--accent);
  border-radius: var(--r-sm);
  padding: 6px 12px;
  white-space: nowrap;
  font-size: .78rem;
  cursor: pointer;
  flex-shrink: 0;
}
.cola-chip.listo { border-color: var(--green); color: var(--green); animation: pulse-green 1s infinite; }

/* ── COBRO MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  display: flex;
  align-items: flex-end;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-box {
  background: var(--bg2);
  border-radius: var(--r) var(--r) 0 0;
  padding: 24px 20px;
  width: 100%;
  max-height: 90dvh;
  overflow-y: auto;
  transform: translateY(20px);
  transition: transform .2s;
  border-top: 1px solid var(--border);
}
.modal-overlay.open .modal-box { transform: translateY(0); }
.modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }

.cobro-resumen {
  background: var(--bg3);
  border-radius: var(--r);
  padding: 14px;
  margin-bottom: 16px;
  font-size: .85rem;
}
.cobro-resumen .cr-total {
  display: flex;
  justify-content: space-between;
  font-size: 1.2rem;
  font-weight: 700;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.cobro-resumen .cr-total span:last-child { color: var(--accent); }

.cobro-input-label { font-size: .82rem; color: var(--muted); margin-bottom: 6px; }
.cobro-input {
  width: 100%;
  background: var(--bg3);
  border: 2px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
  text-align: right;
  margin-bottom: 16px;
  transition: border-color .15s;
}
.cobro-input:focus { outline: none; border-color: var(--accent); }
.cobro-input.error { border-color: var(--red); }
.cobro-input.ok { border-color: var(--green); }
.cobro-cambio { font-size: 1rem; color: var(--green); font-weight: 700; text-align: right; margin-bottom: 20px; min-height: 24px; }

.btn-cobrar {
  width: 100%;
  background: var(--green);
  color: #000;
  border: none;
  border-radius: var(--r);
  padding: 16px;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s;
  margin-bottom: 10px;
}
.btn-cobrar:disabled { background: var(--bg3); color: var(--muted); cursor: not-allowed; }
.btn-cobrar:not(:disabled):active { background: #3d9a65; transform: scale(.98); }

.btn-cancelar-cobro {
  width: 100%;
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
  font-size: .9rem;
  color: var(--muted);
  cursor: pointer;
}

/* ── ENCARGADO ── */
#s-encargado {
  background: var(--bg);
}
.enc-header {
  padding: 16px 20px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.enc-header h2 { font-size: 1.1rem; font-weight: 700; }
.enc-content { flex: 1; overflow-y: auto; padding: 16px; }

.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
  text-align: center;
}
.stat-val { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
.stat-lab { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }

.enc-mesas { display: flex; flex-direction: column; gap: 8px; }
.enc-mesa-row {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.enc-mesa-nombre { font-size: .9rem; font-weight: 600; min-width: 80px; }
.enc-mesa-emp { font-size: .78rem; color: var(--muted); flex: 1; }
.enc-mesa-total { font-size: .9rem; font-weight: 700; color: var(--green); }
.enc-mesa-tiempo { font-size: .72rem; color: var(--muted); }

/* ── ADMIN ── */
#s-admin {
  background: var(--bg);
}
.admin-header {
  padding: 16px 20px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.admin-header h2 { flex: 1; font-size: 1.1rem; font-weight: 700; }
.admin-tabs {
  display: flex;
  overflow-x: auto;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  gap: 0;
}
.admin-tab {
  padding: 10px 16px;
  font-size: .82rem;
  color: var(--muted);
  cursor: pointer;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all .15s;
}
.admin-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.admin-content { flex: 1; overflow-y: auto; padding: 16px; }

/* árbol admin */
.arbol-admin-lista { display: flex; flex-direction: column; gap: 6px; }
.arbol-admin-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
.arbol-admin-item:active { background: var(--bg3); }
.arbol-admin-emoji { font-size: 1.2rem; }
.arbol-admin-info { flex: 1; }
.arbol-admin-nom { font-size: .88rem; font-weight: 500; }
.arbol-admin-det { font-size: .72rem; color: var(--muted); }
.arbol-admin-acc { display: flex; gap: 6px; }
.btn-edit-nodo, .btn-del-nodo, .btn-add-hijo {
  padding: 5px 10px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--muted);
  font-size: .72rem;
  cursor: pointer;
}
.btn-add-hijo { color: var(--accent); border-color: rgba(232,160,74,.4); }
.btn-del-nodo { color: var(--red); border-color: rgba(224,85,85,.3); }
.arbol-admin-indent { padding-left: 20px; }

/* Form genérico */
.form-group { margin-bottom: 14px; }
.form-label { font-size: .8rem; color: var(--muted); margin-bottom: 6px; display: block; }
.form-input, .form-select {
  width: 100%;
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 12px;
  font-size: .9rem;
  color: var(--text);
  transition: border-color .15s;
}
.form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }
.form-select option { background: var(--bg2); }

.btn-save {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--r);
  padding: 12px 20px;
  font-size: .9rem;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
}
.btn-save:active { background: var(--accent2); }

.form-check { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.form-check input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
.form-check label { font-size: .88rem; cursor: pointer; }

/* Toast */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 20px;
  font-size: .88rem;
  z-index: 200;
  opacity: 0;
  transition: all .25s;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: var(--shadow);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok { border-color: var(--green); color: var(--green); }
#toast.err { border-color: var(--red); color: var(--red); }

/* Spinner */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Utils */
.flex-center { display: flex; align-items: center; justify-content: center; }
.mb-8 { margin-bottom: 8px; }
.empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: .9rem; }
</style>
</head>

<script>
// ══════════════════════════════════════════════════════════
// CONFIGURACIÓN SUPABASE
// ══════════════════════════════════════════════════════════
const SUPA_URL = 'https://trwnvdyuhccgyzbafgtz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyd252ZHl1aGNjZ3l6YmFmZ3R6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NDI2MzMsImV4cCI6MjA5NDMxODYzM30.zT77a1_ut96IGoul1oaR0hnQ9XPqkzKoYOzRUnrZIzo';

const H = { 'Content-Type': 'application/json', 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY };

// API helpers
async function dbGet(tabla, params = '') {
  const r = await fetch(`${SUPA_URL}/rest/v1/${tabla}${params}`, { headers: { ...H, 'Prefer': 'return=representation' } });
  return r.json();
}
async function dbPost(tabla, body) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${tabla}`, { method: 'POST', headers: { ...H, 'Prefer': 'return=representation' }, body: JSON.stringify(body) });
  return r.json();
}
async function dbPatch(tabla, filtro, body) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${tabla}?${filtro}`, { method: 'PATCH', headers: { ...H, 'Prefer': 'return=representation' }, body: JSON.stringify(body) });
  return r.json();
}
async function dbDelete(tabla, filtro) {
  await fetch(`${SUPA_URL}/rest/v1/${tabla}?${filtro}`, { method: 'DELETE', headers: H });
}
async function dbRpc(fn, body = {}) {
  const r = await fetch(`${SUPA_URL}/rest/v1/rpc/${fn}`, { method: 'POST', headers: H, body: JSON.stringify(body) });
  return r.json();
}

// ══════════════════════════════════════════════════════════
// ESTADO GLOBAL
// ══════════════════════════════════════════════════════════
let yo = null;          // empleado logueado
let zonas = [];         // todas las zonas
let sesiones = [];      // sesiones activas
let arbol = [];         // nodos del menú
let cfg = {};           // config global

let zonaActual = null;  // zona seleccionada
let sesionActual = null;
let rondaActual = null;
let lineasPendientes = []; // líneas de la ronda sin confirmar
let tapasExtra = 0;
let arbolPila = [];     // pila de navegación del árbol

let pinBuffer = '';
let empSel = null;

let ws = null;          // WebSocket Supabase Realtime
let toastTimer = null;

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
async function init() {
  await cargarConfig();
  await cargarEmpleados();
  conectarRealtime();
}

async function cargarConfig() {
  const rows = await dbGet('config');
  rows.forEach(r => { try { cfg[r.clave] = JSON.parse(r.valor) || r.valor; } catch(e) { cfg[r.clave] = r.valor; } });
  if (cfg.negocio) {
    document.getElementById('login-logo').textContent = cfg.negocio.logo || '🍽️';
    document.getElementById('login-nombre').textContent = cfg.negocio.nombre || 'TPV Restaurante';
    document.title = cfg.negocio.nombre || 'TPV Restaurante';
  }
}

async function cargarEmpleados() {
  const emps = await dbGet('empleados', '?activo=eq.true&order=nombre');
  renderLoginEmps(emps);
}

// ══════════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════════
const ROL_ICON = { admin:'👑', encargado:'👔', camarero:'🧑‍🍽️', cocina:'👨‍🍳' };
const ROL_LAB  = { admin:'Admin', encargado:'Encargado', camarero:'Camarero', cocina:'Cocina / Barra' };

function renderLoginEmps(emps) {
  const el = document.getElementById('emp-list');
  el.innerHTML = emps.map(e => `
    <div class="emp-btn" onclick="selEmp(${JSON.stringify(e).replace(/"/g,'&quot;')})">
      <div class="emp-icon">${ROL_ICON[e.rol] || '👤'}</div>
      <div class="emp-name">${e.nombre}</div>
      <div class="emp-rol">${ROL_LAB[e.rol] || e.rol}</div>
    </div>
  `).join('');
}

function selEmp(e) {
  empSel = e;
  document.querySelectorAll('.emp-btn').forEach(b => b.classList.remove('sel'));
  event.currentTarget.classList.add('sel');
  pinBuffer = '';
  document.getElementById('pin-section').style.display = 'block';
  document.getElementById('pin-error').textContent = '';
  renderPin();
  renderPinPad();
}

function renderPin() {
  const d = document.getElementById('pin-display');
  d.innerHTML = Array(6).fill(0).map((_, i) =>
    `<div class="pin-dot ${i < pinBuffer.length ? 'filled' : ''}"></div>`
  ).join('');
}

function renderPinPad() {
  const p = document.getElementById('pin-pad');
  const keys = ['1','2','3','4','5','6','7','8','9','DEL','0','OK'];
  p.innerHTML = keys.map(k => {
    if (k === 'DEL') return `<button class="pin-key del" onclick="pinKey('DEL')">⌫</button>`;
    if (k === 'OK')  return `<button class="pin-key ok"  onclick="pinKey('OK')">✓</button>`;
    return `<button class="pin-key" onclick="pinKey('${k}')">${k}</button>`;
  }).join('');
}

function pinKey(k) {
  if (k === 'DEL') { pinBuffer = pinBuffer.slice(0,-1); renderPin(); return; }
  if (k === 'OK') { verificarPin(); return; }
  if (pinBuffer.length >= 6) return;
  pinBuffer += k;
  renderPin();
  if (pinBuffer.length >= 4) verificarPin();
}

async function verificarPin() {
  if (!empSel) return;
  if (pinBuffer !== empSel.pin) {
    document.getElementById('pin-error').textContent = 'PIN incorrecto';
    pinBuffer = '';
    renderPin();
    setTimeout(() => { document.getElementById('pin-error').textContent = ''; }, 2000);
    return;
  }
  yo = empSel;
  await entrar();
}

async function entrar() {
  if (yo.rol === 'cocina') { mostrarPantalla('s-cocina'); await initCocina(); return; }
  if (yo.rol === 'encargado') { mostrarPantalla('s-encargado'); await initEncargado(); return; }
  if (yo.rol === 'admin') { mostrarPantalla('s-admin'); await initAdmin(); return; }
  // camarero
  mostrarPantalla('s-zona');
  document.getElementById('zona-empleado-nombre').textContent = yo.nombre;
  await cargarZonas();
}

function logout() {
  yo = null; zonaActual = null; sesionActual = null; rondaActual = null;
  lineasPendientes = []; tapasExtra = 0; arbolPila = []; pinBuffer = ''; empSel = null;
  document.getElementById('pin-section').style.display = 'none';
  document.querySelectorAll('.emp-btn').forEach(b => b.classList.remove('sel'));
  mostrarPantalla('s-login');
}

// ══════════════════════════════════════════════════════════
// ZONAS
// ══════════════════════════════════════════════════════════
async function cargarZonas() {
  zonas = await dbGet('zonas', '?activa=eq.true&order=tipo,orden');
  sesiones = await dbGet('sesiones', '?estado=eq.abierta&select=*,zonas(nombre)');
  renderZonas();
}

function renderZonas() {
  const tipos = [...new Set(zonas.map(z => z.tipo))];
  // Tabs
  const tabs = document.getElementById('zona-tabs');
  tabs.innerHTML = tipos.map((t, i) =>
    `<button class="zona-tab ${i===0?'active':''}" onclick="filtrarZona('${t}',this)">${tipoLabel(t)}</button>`
  ).join('');
  filtrarZona(tipos[0]);
}

function tipoLabel(t) {
  return { mesa:'🍽️ Mesas', barra:'🍺 Barra', terraza:'🌿 Terraza', otra:'📍 Otras' }[t] || t;
}

let tipoActual = '';
function filtrarZona(tipo, btn) {
  tipoActual = tipo;
  if (btn) {
    document.querySelectorAll('.zona-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  const grid = document.getElementById('zona-grid');
  const lista = zonas.filter(z => z.tipo === tipo);

  grid.innerHTML = lista.map(z => {
    const ses = sesiones.find(s => s.zona_id === z.id);
    const libre = !ses;
    const miZona = yo?.zonas_asignadas?.includes(z.id);
    const cls = libre ? 'libre' : (miZona ? 'mi-zona' : 'ocupada');
    return `
      <div class="zona-card ${cls}" onclick="selZona('${z.id}')">
        ${ses?.turno ? `<span class="zc-turno">#${ses.turno}</span>` : ''}
        <div class="zc-nombre">${z.nombre}</div>
        <div class="zc-estado">${libre ? 'Libre' : 'Ocupada'}</div>
        ${ses ? `<div class="zc-total" id="zt-${z.id}">···</div>` : ''}
      </div>
    `;
  }).join('');

  // Cargar totales async
  sesiones.filter(s => lista.find(z => z.id === s.zona_id)).forEach(async s => {
    const tot = await calcTotalSesion(s.id);
    const el = document.getElementById(`zt-${s.zona_id}`);
    if (el) el.textContent = fmt(tot);
  });
}

async function selZona(zonaId) {
  const zona = zonas.find(z => z.id === zonaId);
  const ses = sesiones.find(s => s.zona_id === zonaId);
  zonaActual = zona;

  if (!ses) {
    // Abrir nueva sesión
    const turno = await dbRpc('asignar_turno');
    const [nueva] = await dbPost('sesiones', {
      zona_id: zona.id,
      empleado_id: yo.id,
      estado: 'abierta',
      turno: turno
    });
    sesionActual = nueva;
  } else {
    sesionActual = ses;
  }

  // Cargar árbol si no está
  if (!arbol.length) arbol = await dbGet('menu_nodos', '?activo=eq.true&order=orden');

  // Cargar ronda actual o crear
  await cargarRondaActual();
  await initPedido();
}

async function cargarRondaActual() {
  const rondas = await dbGet('rondas', `?sesion_id=eq.${sesionActual.id}&estado=neq.servida&order=numero&limit=1`);
  if (rondas.length) {
    rondaActual = rondas[0];
    lineasPendientes = await dbGet('lineas', `?ronda_id=eq.${rondaActual.id}`);
  } else {
    // Buscar último número de ronda
    const todas = await dbGet('rondas', `?sesion_id=eq.${sesionActual.id}&order=numero.desc&limit=1`);
    const num = todas.length ? todas[0].numero + 1 : 1;
    const [r] = await dbPost('rondas', { sesion_id: sesionActual.id, numero: num });
    rondaActual = r;
    lineasPendientes = [];
  }
}

// ══════════════════════════════════════════════════════════
// PEDIDO
// ══════════════════════════════════════════════════════════
async function initPedido() {
  mostrarPantalla('s-pedido');
  document.getElementById('ped-zona-nombre').textContent = zonaActual.nombre;
  tapasExtra = 0;
  document.getElementById('tapa-num').textContent = '0';
  arbolPila = [];
  setPedTab('menu');
  renderArbol();
  renderTicket();
  actualizarTotal();

  // Cola de barra (para barman)
  if (yo.rol === 'camarero' && yo.zonas_asignadas?.some(id => zonas.find(z => z.id === id && z.tipo === 'barra'))) {
    document.getElementById('cola-bar').style.display = 'flex';
    await cargarColaBarra();
  }
}

function setPedTab(tab) {
  document.querySelectorAll('.ped-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.ped-sub').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('psub-' + tab).classList.add('active');
  if (tab === 'ticket') renderTicket();
}

// ── Árbol de menú ──
function renderArbol() {
  const padreId = arbolPila.length ? arbolPila[arbolPila.length-1].id : null;
  const hijos = arbol.filter(n => n.padre_id === padreId);

  // Navegación
  const nav = document.getElementById('arbol-nav');
  if (arbolPila.length) {
    nav.innerHTML = `
      <button class="bk-arbol" onclick="subirArbol()">← Atrás</button>
      <span class="ruta">${arbolPila.map(n => n.emoji + ' ' + n.nombre).join(' › ')}</span>
    `;
  } else {
    nav.innerHTML = `<span class="ruta">Selecciona categoría</span>`;
  }

  const grid = document.getElementById('arbol-grid');
  grid.innerHTML = hijos.map(n => {
    const esHoja = n.precio !== null;
    return `
      <div class="arbol-nodo ${esHoja ? 'hoja' : ''}" onclick="tocarNodo(${JSON.stringify(n).replace(/"/g,'&quot;')})">
        <div class="an-emoji">${n.emoji || '📦'}</div>
        <div class="an-nombre">${n.nombre}</div>
        ${esHoja ? `<div class="an-precio">${fmt(n.precio)}</div>` : ''}
      </div>
    `;
  }).join('') || `<div class="empty">Sin elementos en esta categoría</div>`;

  // Botón confirmar
  document.getElementById('btn-confirmar').disabled = !lineasPendientes.length && tapasExtra === 0;
}

function tocarNodo(n) {
  const esHoja = n.precio !== null;
  if (esHoja) {
    añadirLinea(n);
  } else {
    arbolPila.push(n);
    renderArbol();
  }
}

function subirArbol() {
  arbolPila.pop();
  renderArbol();
}

async function añadirLinea(nodo) {
  // Buscar si ya existe en pendientes
  const ya = lineasPendientes.find(l => l.nodo_id === nodo.id && !l.nota);
  if (ya) {
    // Incrementar cantidad
    await dbPatch('lineas', `id=eq.${ya.id}`, { cantidad: ya.cantidad + 1 });
    ya.cantidad++;
  } else {
    // Determinar destino
    let dest = nodo.destino || 'barra';
    if (dest === 'ambos') dest = 'barra'; // la línea barra; se duplica al confirmar

    const [linea] = await dbPost('lineas', {
      ronda_id: rondaActual.id,
      nodo_id: nodo.id,
      nombre: nodo.nombre,
      precio: nodo.precio,
      cantidad: 1,
      destino: dest,
      incluye_tapa: nodo.incluye_tapa || false
    });
    lineasPendientes.push(linea);

    // Si destino 'ambos', crear también línea cocina
    if (nodo.destino === 'ambos') {
      const [linea2] = await dbPost('lineas', {
        ronda_id: rondaActual.id,
        nodo_id: nodo.id,
        nombre: nodo.nombre,
        precio: 0,
        cantidad: 1,
        destino: 'cocina',
        incluye_tapa: false
      });
      lineasPendientes.push(linea2);
    }
  }

  toast(`+ ${nodo.nombre}`, 'ok');
  actualizarTotal();
  document.getElementById('btn-confirmar').disabled = false;

  // Badge ticket
  const cnt = lineasPendientes.reduce((a, l) => a + l.cantidad, 0) + tapasExtra;
  const badge = document.getElementById('ticket-badge');
  badge.textContent = cnt;
  badge.style.display = cnt > 0 ? '' : 'none';
}

function cambiarTapa(delta) {
  tapasExtra = Math.max(0, tapasExtra + delta);
  document.getElementById('tapa-num').textContent = tapasExtra;
  document.getElementById('btn-confirmar').disabled = !lineasPendientes.length && tapasExtra === 0;
}

async function confirmarRonda() {
  if (!lineasPendientes.length && tapasExtra === 0) return;

  // Tapas extra: añadir como línea especial
  if (tapasExtra > 0) {
    const precioTapa = cfg.tapas_extra?.precio || 1.50;
    const [linTapa] = await dbPost('lineas', {
      ronda_id: rondaActual.id,
      nodo_id: null,
      nombre: 'Tapa extra',
      precio: precioTapa,
      cantidad: tapasExtra,
      destino: 'cocina'
    });
    lineasPendientes.push(linTapa);
  }

  // Marcar ronda como confirmada
  await dbPatch('rondas', `id=eq.${rondaActual.id}`, {
    estado: 'confirmada',
    confirmada_at: new Date().toISOString(),
    tapas_extra: tapasExtra,
    precio_tapa_extra: cfg.tapas_extra?.precio || 1.50
  });

  // Crear tickets por destino
  const destinos = [...new Set(lineasPendientes.map(l => l.destino))];
  for (const dest of destinos) {
    const linDest = lineasPendientes.filter(l => l.destino === dest);
    await dbPost('tickets', {
      ronda_id: rondaActual.id,
      sesion_id: sesionActual.id,
      zona_nombre: zonaActual.nombre,
      destino: dest,
      estado: 'pendiente',
      empleado_nombre: yo.nombre,
      lineas: linDest
    });
  }

  // Auditoría
  await dbPost('auditoria', {
    empleado_id: yo.id,
    empleado_nombre: yo.nombre,
    accion: 'confirmar_pedido',
    detalle: { sesion_id: sesionActual.id, ronda: rondaActual.numero, items: lineasPendientes.length }
  });

  toast('Pedido enviado', 'ok');
  tapasExtra = 0;
  document.getElementById('tapa-num').textContent = '0';
  lineasPendientes = [];
  document.getElementById('ticket-badge').style.display = 'none';
  document.getElementById('btn-confirmar').disabled = true;

  // Crear siguiente ronda
  const [nuevaRonda] = await dbPost('rondas', {
    sesion_id: sesionActual.id,
    numero: rondaActual.numero + 1
  });
  rondaActual = nuevaRonda;

  renderTicket();
  actualizarTotal();
}

// ── Ticket ──
async function renderTicket() {
  const rondas = await dbGet('rondas', `?sesion_id=eq.${sesionActual.id}&order=numero`);
  const scroll = document.getElementById('ticket-scroll');

  if (!rondas.length) { scroll.innerHTML = '<div class="empty">Sin pedido</div>'; return; }

  let html = '';
  let total = 0;

  for (const r of rondas) {
    const lineas = await dbGet('lineas', `?ronda_id=eq.${r.id}`);
    if (!lineas.length) continue;
    const subTotal = lineas.reduce((a, l) => a + (l.precio * l.cantidad), 0);
    total += subTotal;

    html += `
      <div class="ronda-bloque">
        <div class="ronda-header">
          <span class="ronda-num">Ronda ${r.numero}</span>
          <span class="ronda-estado ${r.estado}">${estadoLab(r.estado)}</span>
        </div>
        ${lineas.map(l => `
          <div class="linea-row">
            <span class="linea-cant">×${l.cantidad}</span>
            <span class="linea-nom">
              ${l.nombre}${l.incluye_tapa ? ' <span class="linea-tapa">+tapa</span>' : ''}
              ${l.nombre === 'Tapa extra' ? ' class="linea-tapa-extra"' : ''}
            </span>
            <span class="linea-precio">${fmt(l.precio * l.cantidad)}</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  scroll.innerHTML = html || '<div class="empty">Sin pedido todavía</div>';
  document.getElementById('ticket-total-val').textContent = fmt(total);

  // Botones de acción
  renderBotonesTicket(rondas);
}

function estadoLab(e) {
  return { pendiente:'Sin confirmar', confirmada:'En preparación', servida:'Servida' }[e] || e;
}

async function renderBotonesTicket(rondas) {
  // Botón "ronda servida"
  const confirmadas = rondas.filter(r => r.estado === 'confirmada');
  const btnS = document.getElementById('btn-servida');
  btnS.style.display = confirmadas.length ? '' : 'none';

  // Avisos (bebida lista, comida lista)
  const tickets = await dbGet('tickets', `?sesion_id=eq.${sesionActual.id}&estado=eq.listo`);
  const avisos = document.getElementById('btn-avisos');
  avisos.innerHTML = '';
  tickets.forEach(t => {
    const btn = document.createElement('button');
    btn.className = `btn-sec ${t.destino === 'barra' ? 'btn-aviso-beb' : 'btn-aviso'}`;
    btn.textContent = t.destino === 'barra' ? '🍺 Bebida lista → Recoger' : '🍽️ Comida lista → Recoger';
    btn.onclick = () => marcarRecogido(t.id);
    avisos.appendChild(btn);
  });
}

async function marcarServida() {
  const rondas = await dbGet('rondas', `?sesion_id=eq.${sesionActual.id}&estado=eq.confirmada`);
  for (const r of rondas) {
    await dbPatch('rondas', `id=eq.${r.id}`, { estado: 'servida', servida_at: new Date().toISOString() });
  }
  toast('Ronda marcada como servida', 'ok');
  renderTicket();
}

async function marcarRecogido(ticketId) {
  await dbPatch('tickets', `id=eq.${ticketId}`, { estado: 'recogido', recogido_at: new Date().toISOString() });
  toast('Recogido ✓', 'ok');
  renderTicket();
}

async function pedirCuenta() {
  const btn = document.getElementById('btn-cuenta');
  btn.classList.toggle('activo');
  toast('Cuenta solicitada', 'ok');
}

// ── Total ──
async function actualizarTotal() {
  const total = await calcTotalSesion(sesionActual.id);
  document.getElementById('ped-total').textContent = fmt(total);
}

async function calcTotalSesion(sesId) {
  const rondas = await dbGet('rondas', `?sesion_id=eq.${sesId}`);
  let total = 0;
  for (const r of rondas) {
    const lineas = await dbGet('lineas', `?ronda_id=eq.${r.id}`);
    total += lineas.reduce((a, l) => a + l.precio * l.cantidad, 0);
  }
  return total;
}

// ── Cobro ──
async function abrirCobro() {
  const total = await calcTotalSesion(sesionActual.id);
  const rondas = await dbGet('rondas', `?sesion_id=eq.${sesionActual.id}&order=numero`);

  let resHtml = `<div style="font-size:.82rem;color:var(--muted);margin-bottom:8px">${zonaActual.nombre}</div>`;
  for (const r of rondas) {
    const lineas = await dbGet('lineas', `?ronda_id=eq.${r.id}`);
    if (!lineas.length) continue;
    resHtml += `<div style="font-size:.78rem;color:var(--muted);margin:6px 0 2px">Ronda ${r.numero}</div>`;
    lineas.forEach(l => {
      resHtml += `<div style="display:flex;justify-content:space-between;font-size:.85rem;padding:2px 0">
        <span>×${l.cantidad} ${l.nombre}</span><span>${fmt(l.precio * l.cantidad)}</span></div>`;
    });
  }
  resHtml += `<div class="cr-total"><span>Total</span><span>${fmt(total)}</span></div>`;

  document.getElementById('cobro-resumen').innerHTML = resHtml;
  document.getElementById('cobro-efectivo').value = '';
  document.getElementById('cobro-efectivo').className = 'cobro-input';
  document.getElementById('cobro-cambio').textContent = '';
  document.getElementById('btn-cobrar').disabled = true;
  document.getElementById('btn-cobrar').dataset.total = total;

  document.getElementById('modal-cobro').classList.add('open');
}

function calcCambio() {
  const total = parseFloat(document.getElementById('btn-cobrar').dataset.total) || 0;
  const efect = parseFloat(document.getElementById('cobro-efectivo').value) || 0;
  const input = document.getElementById('cobro-efectivo');
  const cambioEl = document.getElementById('cobro-cambio');
  const btnC = document.getElementById('btn-cobrar');

  if (efect >= total) {
    input.className = 'cobro-input ok';
    cambioEl.textContent = `Cambio: ${fmt(efect - total)}`;
    btnC.disabled = false;
  } else {
    input.className = efect > 0 ? 'cobro-input error' : 'cobro-input';
    cambioEl.textContent = efect > 0 ? `Faltan ${fmt(total - efect)}` : '';
    btnC.disabled = true;
  }
}

async function confirmarCobro() {
  const total = parseFloat(document.getElementById('btn-cobrar').dataset.total);
  const efect = parseFloat(document.getElementById('cobro-efectivo').value);
  const cambio = efect - total;

  const numTicket = await dbRpc('siguiente_numero_ticket');

  // Construir desglose
  const rondas = await dbGet('rondas', `?sesion_id=eq.${sesionActual.id}&order=numero`);
  const desglose = [];
  for (const r of rondas) {
    const lineas = await dbGet('lineas', `?ronda_id=eq.${r.id}`);
    if (lineas.length) desglose.push({ ronda: r.numero, lineas });
  }

  await dbPost('cobros', {
    sesion_id: sesionActual.id,
    numero_ticket: numTicket,
    empleado_id: yo.id,
    total, efectivo: efect, cambio,
    desglose
  });

  // Cerrar sesión
  await dbPatch('sesiones', `id=eq.${sesionActual.id}`, { estado: 'cobrada', cerrada_at: new Date().toISOString() });

  // Auditoría
  await dbPost('auditoria', {
    empleado_id: yo.id,
    empleado_nombre: yo.nombre,
    accion: 'cobro',
    detalle: { sesion_id: sesionActual.id, total, ticket: numTicket }
  });

  cerrarCobro();
  toast(`✓ Cobrado ${numTicket} — ${fmt(total)}`, 'ok');

  // Imprimir ticket
  imprimirTicket({ numTicket, zona: zonaActual.nombre, camarero: yo.nombre, desglose, total, efectivo: efect, cambio });

  volverAZonas();
}

function cerrarCobro() { document.getElementById('modal-cobro').classList.remove('open'); }

function imprimirTicket(datos) {
  const w = window.open('', '_blank', 'width=400,height=600');
  if (!w) return;
  const negocio = cfg.negocio || {};
  let html = `<html><head><meta charset="UTF-8">
  <style>
    body { font-family: monospace; width: 280px; margin: 0 auto; padding: 10px; font-size: 13px; }
    .c { text-align: center; } .r { display:flex; justify-content:space-between; }
    hr { border: none; border-top: 1px dashed #000; margin: 6px 0; }
    .big { font-size: 1.2em; font-weight: bold; }
  </style></head><body>
  <div class="c big">${negocio.logo || '🍽️'} ${negocio.nombre || 'Restaurante'}</div>
  <div class="c" style="font-size:11px">${new Date().toLocaleString('es-ES')}</div>
  <div class="c">${datos.zona} · ${datos.camarero}</div>
  <div class="c" style="font-size:11px">${datos.numTicket}</div><hr>`;

  datos.desglose.forEach(r => {
    html += `<div style="font-size:11px;color:#666">— Ronda ${r.ronda} —</div>`;
    r.lineas.forEach(l => {
      html += `<div class="r"><span>×${l.cantidad} ${l.nombre}</span><span>${fmt(l.precio * l.cantidad)}</span></div>`;
    });
  });

  html += `<hr><div class="r big"><span>TOTAL</span><span>${fmt(datos.total)}</span></div>
  <div class="r"><span>Efectivo</span><span>${fmt(datos.efectivo)}</span></div>
  <div class="r"><span>Cambio</span><span>${fmt(datos.cambio)}</span></div><hr>
  <div class="c">${negocio.mensaje_ticket || '¡Gracias por su visita!'}</div>
  </body></html>`;

  w.document.write(html);
  w.document.close();
  w.print();
}

// ── Cola barra ──
async function cargarColaBarra() {
  const tickets = await dbGet('tickets', `?destino=eq.barra&estado=neq.recogido&order=created_at&limit=20`);
  const bar = document.getElementById('cola-bar');
  if (!tickets.length) { bar.innerHTML = '<span style="color:var(--muted);font-size:.78rem">Sin pedidos de barra</span>'; return; }
  bar.innerHTML = tickets.map(t => `
    <div class="cola-chip ${t.estado}" onclick="verTicketBarra('${t.id}')">
      ${t.zona_nombre} · ${t.lineas.length} item${t.lineas.length !== 1 ? 's' : ''}
      ${t.estado === 'listo' ? ' ✓' : ''}
    </div>
  `).join('');
}

// ══════════════════════════════════════════════════════════
// COCINA / BARRA
// ══════════════════════════════════════════════════════════
let destinoCocina = 'cocina';

async function initCocina() {
  // Determinar si es barra o cocina según el empleado
  destinoCocina = yo.rol === 'cocina' ? 'cocina' : 'barra';
  document.getElementById('cocina-titulo').textContent = destinoCocina === 'barra' ? 'Barra' : 'Cocina';
  document.getElementById('cocina-destino-badge').textContent = destinoCocina;
  document.getElementById('cocina-destino-badge').className = `cocina-destino ${destinoCocina}`;
  await cargarTicketsCocina();
}

async function cargarTicketsCocina() {
  const tickets = await dbGet('tickets', `?destino=eq.${destinoCocina}&estado=neq.recogido&order=created_at`);
  renderTicketsCocina(tickets);
}

function renderTicketsCocina(tickets) {
  const lista = document.getElementById('cocina-lista');
  if (!tickets.length) {
    lista.innerHTML = '<div class="empty">Sin pedidos pendientes</div>';
    return;
  }

  lista.innerHTML = tickets.map(t => {
    const mins = Math.floor((Date.now() - new Date(t.created_at)) / 60000);
    const urgente = mins >= (cfg.tiempos?.aviso_demora_min || 15);
    return `
      <div class="ticket-card ${t.estado === 'listo' ? 'listo' : 'nuevo'}" id="tc-${t.id}">
        <div class="tc-head">
          <span class="tc-zona">${t.zona_nombre}</span>
          <span class="tc-camarero">${t.empleado_nombre || ''}</span>
          <span class="tc-tiempo ${urgente ? 'urgente' : ''}">${mins}min</span>
        </div>
        <div class="tc-lineas">
          ${(t.lineas || []).map(l => `
            <div class="tc-linea">
              <span class="tc-cant">${l.cantidad}</span>
              <span class="tc-nom">${l.nombre}</span>
              ${l.nota ? `<span class="tc-nota">${l.nota}</span>` : ''}
            </div>
          `).join('')}
        </div>
        ${t.estado !== 'listo'
          ? `<button class="tc-btn-listo" onclick="marcarListo('${t.id}')">✓ Listo → Avisar camarero</button>`
          : `<button class="tc-btn-listo ya-listo" disabled>✓ Avisado — esperando recogida</button>`
        }
      </div>
    `;
  }).join('');
}

async function marcarListo(ticketId) {
  await dbPatch('tickets', `id=eq.${ticketId}`, { estado: 'listo', listo_at: new Date().toISOString() });
  toast('Camarero avisado ✓', 'ok');
  await cargarTicketsCocina();
}

// ══════════════════════════════════════════════════════════
// ENCARGADO
// ══════════════════════════════════════════════════════════
async function initEncargado() {
  await actualizarEncargado();
  setInterval(actualizarEncargado, 15000);
}

async function actualizarEncargado() {
  const sesionesList = await dbGet('sesiones', '?estado=eq.abierta&select=*,zonas(nombre),empleados(nombre)');
  const cobrosHoy = await dbGet('cobros', `?created_at=gte.${hoy()}`);
  const ticketsCola = await dbGet('tickets', '?estado=eq.pendiente');

  const totalHoy = cobrosHoy.reduce((a, c) => a + (c.total || 0), 0);

  document.getElementById('enc-mesas-abiertas').textContent = sesionesList.length;
  document.getElementById('enc-ingresos').textContent = fmt(totalHoy);
  document.getElementById('enc-tickets-cola').textContent = ticketsCola.length;

  const lista = document.getElementById('enc-mesas-lista');
  lista.innerHTML = sesionesList.map(s => `
    <div class="enc-mesa-row">
      <span class="enc-mesa-nombre">${s.zonas?.nombre || '—'}</span>
      <span class="enc-mesa-emp">${s.empleados?.nombre || '—'}</span>
      <span class="enc-mesa-tiempo">${tiempoDesde(s.created_at)}</span>
      <span class="enc-mesa-total" id="enc-tot-${s.id}">···</span>
    </div>
  `).join('') || '<div class="empty">Sin mesas abiertas</div>';

  sesionesList.forEach(async s => {
    const tot = await calcTotalSesion(s.id);
    const el = document.getElementById(`enc-tot-${s.id}`);
    if (el) el.textContent = fmt(tot);
  });
}

async function initAdmin() {

function adminTab(tab) {
  document.querySelectorAll('.admin-tab').forEach((t, i) => {
    const tabs = ['zonas','menu','empleados','config','tickets'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  const content = document.getElementById('admin-content');
  if (tab === 'zonas') renderAdminZonas(content);
  else if (tab === 'menu') renderAdminMenu(content);
  else if (tab === 'empleados') renderAdminEmpleados(content);
  else if (tab === 'config') renderAdminConfig(content);
  else if (tab === 'tickets') renderAdminTickets(content);
}

let adminArbolPadre = null;

async function renderAdminMenu(el) {

function renderArbolAdmin(nodos, nivel) {
  return nodos.map(n => {

    return `
      <div style="padding-left:${nivel * 20}px">
        <div class="arbol-admin-item">
          <span class="arbol-admin-emoji">${n.emoji || '📦'}</span>
          <div class="arbol-admin-info">
            <div class="arbol-admin-nom">${n.nombre}</div>
            <div class="arbol-admin-det">${esHoja ? `${fmt(n.precio)} · ${n.destino || '—'}${n.incluye_tapa?' · +tapa':''}` : 'Categoría'}</div>

          <div class="arbol-admin-acc">
            <button class="btn-add-hijo" onclick='abrirModalNodo(null,"${n.id}")'>+ hijo</button>
            <button class="btn-edit-nodo" onclick='abrirModalNodo(${JSON.stringify(n).replace(/'/g,"&#39;")},null)'>✏️</button>
            <button class="btn-del-nodo" onclick="eliminarNodo('${n.id}')">🗑</button>
          </div>
        </div>

  }).join('');

// REALTIME SUPABASE
// ══════════════════════════════════════════════════════════
function conectarRealtime() {
  // Usamos polling ligero como alternativa robusta al WebSocket de Supabase
  // (el WebSocket real requiere un canal con nombre específico)
  setInterval(async () => {
    if (!yo) return;
    if (yo.rol === 'cocina') await cargarTicketsCocina();
    if (yo.rol === 'encargado') await actualizarEncargado();
    if (sesionActual) {
      // Actualizar avisos en pantalla de ticket
      if (document.getElementById('psub-ticket')?.classList.contains('active')) {
        const rondas = await dbGet('rondas', `?sesion_id=eq.${sesionActual.id}&order=numero`);
        await renderBotonesTicket(rondas);
      }
      if (document.getElementById('cola-bar')?.style.display !== 'none') {
        await cargarColaBarra();
      }
    }
  }, 8000);
}

// UTILIDADES
// ══════════════════════════════════════════════════════════
function mostrarPantalla(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function volverAZonas() {
  sesionActual = null; rondaActual = null; lineasPendientes = []; tapasExtra = 0; arbolPila = [];
  mostrarPantalla('s-zona');
  cargarZonas();
}

function fmt(n) {
  return (parseFloat(n) || 0).toFixed(2).replace('.', ',') + ' €';
}

function hoy() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function tiempoDesde(iso) {
  const mins = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (mins < 60) return `${mins}min`;
  return `${Math.floor(mins/60)}h ${mins%60}min`;
}

function toast(msg, tipo) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${tipo || ''}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2800);
}
